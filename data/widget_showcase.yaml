widget_showcase:
  pages:
    - widget: blank
      title: blank drift forward
      text: "COLOUR DRIFT"
      colour: multi
      speed: 50
      direction: forward
      note: >
        Bare 'blank' widget is an empty panel. It can optionally show a text message.
    - widget: blank
      title: blank
      text: ""
      note: >
        Multi-all gives the widest palette spread. Colours rotate left across
        the text instead of right.
    - widget: blank
      title: blank with message text
      text: "Your message here\nWhich can be multi-line"
      colour: multi
      speed: 60
      direction: forward
      note: >
        A text message can go over multple lines and can have a colour.  If the colour is
        multi*, then 'direction' and 'speed' will affect text animation of the text.
    - widget: gauge
      title: gauge random direction
      text: "PHASE DRIFT"
      colour: cyan
      speed: 70
      direction: random
      note: >
        A fast gauge example with random directional motion.
    - widget: orbit
      title: orbit dense multi-all
      colour: multi-all
      density: 70
      speed: 65
      direction: backward
      note: >
        Dense orbit field showing combined density, colour, speed, and direction
        modifiers together.
