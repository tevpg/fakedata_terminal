widgets:
  # Widget-specific fallback attributes use the same keys as region entries,
  # except "widget" itself is implied by the mapping key. Supported here:
  # speed, text, source_theme, colour/color, image, and cycle.
  #
  # Example:
  # sweep:
  #   colour: cyan
  # image:
  #   image:
  #     glob: "geom*.png"
  # cycle:
  #   cycle:
  #     widgets: [text, bars, matrix, tunnel]

  # Existing single-region widgets
  atomic:
    - text
    - text_wide
    - text_scant
    - text_spew
    - image
    - life
    - bars
    - gauge
    - matrix
    - scope
    - blocks
    - sweep
    - tunnel
    - cycle

  # Proposed names for the current "gauges" composite when split into regions.
  composite_parts:
    - sparkline
    - readouts
    - text_scant
