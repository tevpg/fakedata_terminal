# Starter config sketch for a layout/region/scene driven version of
# fakedata-terminal.py.
#
# Design rules captured here:
# - layouts define panel geometry
# - regions are named aliases for one or more panels
# - widgets can define per-widget fallback attributes
# - scenes bind widgets/options to regions
# - defaults < widget defaults < scene < CLI override
# - panel aggregation is explicit; no implicit expansion from "none"
# - stable packaged layouts live in data/layouts.yaml

defaults:
  layout: 2x2
  theme: science
  speed: 55
  colour: green
  widget: cycle
  panel_speed: {}
  image:
    glob: "geom*.png"

scenes:

  clocks:
    note: >
      9 clocks
    layout: 4x3
    speed: 90
    regions:
      P1:
        widget: clock
      P2:
        widget: clock
      P3:
        widget: clock
      P4:
        widget: clock
      P5:
        widget: clock
      P6:
        widget: clock
      P7:
        widget: clock
      P8:
        widget: clock
      P9:
        widget: clock
      P10:
        widget: clock
      P11:
        widget: clock
      P12:
        widget: clock

  cycle9:
    note: >
      Cycle everything through 9 panels
    layout: 3x3
    theme: science
    regions:
      P1:
        widget: cycle
      P2:
        widget: cycle
      P3:
        widget: cycle
      P4:
        widget: cycle
      P5:
        widget: cycle
      P6:
        widget: cycle
      P7:
        widget: cycle
      P8:
        widget: cycle
      P9:
        widget: cycle

  cycle4:
    note: >
      Cycle everything through 4 panels
    layout: 2x2
    theme: science
    regions:
      P1:
        widget: cycle
      P2:
        widget: cycle
      P3:
        widget: cycle
      P4:
        widget: cycle

  science:
    note: >
      Derived from: --scene science --main scroller --sidebar clock --sidebar-speed 80
    layout: 3x3
    theme: science
    text: "*** DO NOT USE DOORBELL ***"
    regions:
      L2:
        widget: text_wide
      P7:
        widget: readouts
        text: "TIMEFLUX REDUCTIONS"
      P8:
        widget: text_spew
      P9:
        widget: text_scant

  science2:
    note: >
      3x2 science layout with image centre, fast clock, and life.
    layout: 3x2
    theme: science
    regions:
      P3+P4:
        widget: image
        speed: 90
        image:
          paths:
          - geom_09_polar_lattice.png
          - geom_11_radial_spokes.png
          - geom_12_checker_ring.png
          - pineapple2.jpg
          - geom_14_octagon_web.png
          - geom_15_interference_waves.png
          - geom_21_wave_grid.png
          - pineapple2.jpg
          - geom_23_moire_squares.png
          - geom_31_cone.png
          - geom_32_sphere_wireframe.png
          - pineapple2.jpg
          - geom_33_torus.png
          - geom_35_icosahedron_web.png
          - geom_36_isometric_stairs.png
          - pineapple2.jpg
          - geom_37_interlocking_cubes.png
          - geom_38_prism_fan.png
          - geom_39_hypercube_projection.png
          - pineapple2.jpg
          - geom_40_geodesic_dome.png
      P1:
        widget: text_wide
        speed: 90
      P2:
        widget: text
      P5:
        widget: clock
        speed: 70
      P6:
        widget: life
        speed: 90

  geometries:
    note: >
      Derived from: --scene hacker --main image --image geom*png --sidebar gauges
    layout: L2x2_R3
    theme: hacker
    regions:
      L2x2:
        widget: image
        image:
          glob: "geom*png"
        speed: 70
      UR:
        widget: sparkline
        text: "SIGNAL"
      RM:
        widget: readouts
        text: "READOUTS"
      LR:
        widget: text_scant
        text: "FEED"
        source_theme: hacker

  tunnel:
    note: >
      Full-screen endless tunnel prototype using expanding box outlines.
    layout: full
    theme: science
    speed: 75
    regions:
      full:
        widget: tunnel

  test1:
    note: >
      Mixed 2x2 smoke-test scene with one widget per panel/region.
    layout: 2x2
    theme: science
    regions:
      P1:
        widget: life
      P2:
        widget: sparkline
        text: "SIGNAL"
      P3:
        widget: text
      P4:
        widget: clock

  test2:
    note: >
      Full-screen single-widget skeleton scene.
    layout: full
    theme: finance
    regions:
      full:
        widget: text_wide

  test3:
    note: >
      3x3 split using a wide left region and narrow right column.
    layout: 3x3
    theme: navigation
    regions:
      L2:
        widget: matrix
      R:
        widget: life
        speed: 55

  test4:
    note: >
      Main-plus-sidebar stack with one large text region and two smaller instruments.
    layout: 3x2
    theme: medicine
    regions:
      L2x2:
        widget: text_scant
      UR:
        widget: bars
        text: "LEVELS"
      LR:
        widget: clock
        speed: 70

  test5:
    note: >
      2x2 layout merged into top and bottom bands.
    layout: 2x2
    theme: military
    regions:
      T:
        widget: oscilloscope
      B:
        widget: readouts
        text: "SYSTEMS"

  test6:
    note: >
      3x3 layout split into left, center, and right columns.
    layout: 3x3
    theme: spaceteam
    regions:
      L:
        widget: sparkline
        text: "SIGNAL"
      C:
        widget: text
      R:
        widget: sweep

  test7:
    note: >
      Main-plus-sidebar stack with a large visual field and three smaller panels.
    layout: L2x2_R3
    theme: pharmacy
    regions:
      L2x2:
        widget: blocks
      UR:
        widget: text_spew
      RM:
        widget: readouts
        text: "DOSING"
      LR:
        widget: clock

  gauges:
    note: >
      Three clocks + three sparklines
    layout: 3x3
    theme: pharmacy
    regions:
      P1+P2:
        widget: clock
        speed: 40
      P3:
        widget: sweep
        speed: 60
      P5+P6:
        widget: life
        speed: 100
      P4:
        widget: sparkline
        speed: 60
      P7+P8:
        widget: clock
        speed: 100
      P9:
        widget: oscilloscope
        speed: 90

widgets:
  # Widget-specific fallback attributes use the same keys as region entries,
  # except "widget" itself is implied by the mapping key. Supported here:
  # speed, text, source_theme, colour/color, image, and cycle.
  #
  # Example:
  # sweep:
  #   colour: cyan
  # image:
  #   image:
  #     glob: "geom*.png"
  # cycle:
  #   cycle:
  #     widgets: [text, bars, matrix, tunnel]

  # Existing single-region widgets
  atomic:
    - text
    - text_wide
    - text_scant
    - text_spew
    - image
    - life
    - bars
    - clock
    - matrix
    - oscilloscope
    - blocks
    - sweep
    - tunnel
    - cycle

  # Proposed names for the current "gauges" composite when split into regions.
  composite_parts:
    - sparkline
    - readouts
    - text_scant
