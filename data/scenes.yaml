# Starter config sketch for a layout/region/scene driven version of
# fakedata-terminal.py.
#
# Design rules captured here:
# - layouts define panel geometry
# - regions are named aliases for one or more panels
# - widgets can define per-widget fallback attributes
# - scenes bind widgets/options to regions
# - defaults < widget defaults < scene < CLI override
# - panel aggregation is explicit; no implicit expansion from "none"
# - stable packaged layouts live in data/layouts.yaml

