# Starter config sketch for a layout/region/scene driven version of
# fakedata-terminal.py.
#
# Design rules captured here:
# - layouts define panel geometry
# - regions are named aliases for one or more panels
# - widgets can define per-widget fallback attributes
# - scenes bind widgets/options to regions
# - defaults < widget defaults < scene < CLI override
# - panel aggregation is explicit; no implicit expansion from "none"
# - stable packaged layouts live in data/layouts.yaml

defaults:
  layout: grid_2x2
  theme: science
  speed: 55
  colour: green
  widget: cycle
  panel_speed: {}
  image:
    glob: "geom*.png"

scenes:

  clocks:
    note: >
      9 clocks
    layout: grid_4x3
    speed: 90
    regions:
      p1:
        widget: clock
      p2:
        widget: clock
      p3:
        widget: clock
      p4:
        widget: clock
      p5:
        widget: clock
      p6:
        widget: clock
      p7:
        widget: clock
      p8:
        widget: clock
      p9:
        widget: clock
      p10:
        widget: clock
      p11:
        widget: clock
      p12:
        widget: clock

  cycle9:
    note: >
      Cycle everything through 9 panels
    layout: grid_3x3
    theme: science
    regions:
      p1:
        widget: cycle
      p2:
        widget: cycle
      p3:
        widget: cycle
      p4:
        widget: cycle
      p5:
        widget: cycle
      p6:
        widget: cycle
      p7:
        widget: cycle
      p8:
        widget: cycle
      p9:
        widget: cycle

  cycle4:
    note: >
      Cycle everything through 4 panels
    layout: grid_2x2
    theme: science
    regions:
      p1:
        widget: cycle
      p2:
        widget: cycle
      p3:
        widget: cycle
      p4:
        widget: cycle


  science:
    note: >
      Derived from: --scene science --main scroller --sidebar clock --sidebar-speed 80
    layout: grid_3x3
    theme: science
    text: "*** DO NOT USE DOORBELL ***"
    regions:
      large_left:
        widget: text_wide
      p7:
        widget: readouts
        text: "TIMEFLUX REDUCTIONS"
      p8:
        widget: text_spew
      p9:
        widget: text_scant

  science2:
    note: >
      grid_3x2 science layout with image centre, fast clock, and life.
    layout: grid_3x2
    theme: science
    regions:
      p3+p4:
        widget: image
        speed: 90
        image:
          paths:
          - geom_09_polar_lattice.png
          - geom_11_radial_spokes.png
          - geom_12_checker_ring.png
          - pineapple2.jpg
          - geom_14_octagon_web.png
          - geom_15_interference_waves.png
          - geom_21_wave_grid.png
          - pineapple2.jpg
          - geom_23_moire_squares.png
          - geom_31_cone.png
          - geom_32_sphere_wireframe.png
          - pineapple2.jpg
          - geom_33_torus.png
          - geom_35_icosahedron_web.png
          - geom_36_isometric_stairs.png
          - pineapple2.jpg
          - geom_37_interlocking_cubes.png
          - geom_38_prism_fan.png
          - geom_39_hypercube_projection.png
          - pineapple2.jpg
          - geom_40_geodesic_dome.png
      p1:
        widget: text_wide
        speed: 90
      p2:
        widget: text
      p5:
        widget: clock
        speed: 70
      p6:
        widget: life
        speed: 90

  geometries:
    note: >
      Derived from: --scene hacker --main image --image geom*png --sidebar gauges
    layout: main_2x2_right_stack_3
    theme: hacker
    regions:
      main:
        widget: image
        image:
          glob: "geom*png"
        speed: 70
      right_top:
        widget: sparkline
        text: "SIGNAL"
      right_mid:
        widget: readouts
        text: "READOUTS"
      right_bottom:
        widget: text_scant
        text: "FEED"
        source_theme: hacker

  tunnel:
    note: >
      Full-screen endless tunnel prototype using expanding box outlines.
    layout: full
    theme: science
    speed: 75
    regions:
      full:
        widget: tunnel

  test1:
    note: >
      Mixed 2x2 smoke-test scene with one widget per panel/region.
    layout: grid_2x2
    theme: science
    regions:
      p1:
        widget: life
      p2:
        widget: sparkline
        text: "SIGNAL"
      p3:
        widget: text
      p4:
        widget: clock

  test2:
    note: >
      Full-screen single-widget skeleton scene.
    layout: full
    theme: finance
    regions:
      full:
        widget: text_wide

  test3:
    note: >
      3x3 split using a large-left region and narrow right column.
    layout: grid_3x3
    theme: navigation
    regions:
      large_left:
        widget: matrix
      right:
        widget: life
        speed: 55

  test4:
    note: >
      Main-plus-sidebar stack with one large text region and two smaller instruments.
    layout: grid_3x2
    theme: medicine
    regions:
      main:
        widget: text_scant
      right_top:
        widget: bars
        text: "LEVELS"
      right_bottom:
        widget: clock
        speed: 70

  test5:
    note: >
      2x2 layout merged into top and bottom bands.
    layout: grid_2x2
    theme: military
    regions:
      top:
        widget: oscilloscope
      bottom:
        widget: readouts
        text: "SYSTEMS"

  test6:
    note: >
      3x3 layout split into left, center, and right columns.
    layout: grid_3x3
    theme: spaceteam
    regions:
      left:
        widget: sparkline
        text: "SIGNAL"
      center:
        widget: text
      right:
        widget: sweep

  test7:
    note: >
      Main-plus-sidebar stack with a large visual field and three smaller panels.
    layout: main_2x2_right_stack_3
    theme: pharmacy
    regions:
      main:
        widget: blocks
      right_top:
        widget: text_spew
      right_mid:
        widget: readouts
        text: "DOSING"
      right_bottom:
        widget: clock

  gauges:
    note: >
      Three clocks + three sparklines
    layout: grid_3x3
    theme: pharmacy
    regions:
      p1+p2:
        widget: clock
        speed: 40
      p3:
        widget: sweep
        speed: 60
      p5+p6:
        widget: life
        speed: 100
      p4:
        widget: sparkline
        speed: 60
      p7+p8:
        widget: clock
        speed: 100
      p9:
        widget: oscilloscope
        speed: 90

widgets:
  # Widget-specific fallback attributes use the same keys as region entries,
  # except "widget" itself is implied by the mapping key. Supported here:
  # speed, text, source_theme, colour/color, image, and cycle.
  #
  # Example:
  # sweep:
  #   colour: cyan
  # image:
  #   image:
  #     glob: "geom*.png"
  # cycle:
  #   cycle:
  #     widgets: [text, bars, matrix, tunnel]

  # Existing single-region widgets
  atomic:
    - text
    - text_wide
    - text_scant
    - text_spew
    - image
    - life
    - bars
    - clock
    - matrix
    - oscilloscope
    - blocks
    - sweep
    - tunnel
    - cycle

  # Proposed names for the current "gauges" composite when split into regions.
  composite_parts:
    - sparkline
    - readouts
    - text_scant
